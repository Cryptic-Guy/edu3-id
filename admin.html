<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Portal - Edu3ID</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6200ea;
      --primary-dark: #4a00c9;
      --primary-light: #7c3ff2;
      --accent: #00bcd4;
      --success: #00e676;
      --warning: #ffc400;
      --danger: #ff3d00;
      --dark-bg: #0a0e27;
      --dark-card: #121829;
      --dark-border: #1e2333;
      --text-primary: #ffffff;
      --text-secondary: #a0a8c9;
      --gradient-1: linear-gradient(135deg, #6200ea 0%, #4a00c9 100%);
      --gradient-2: linear-gradient(135deg, #00bcd4 0%, #00acc1 100%);
      --gradient-3: linear-gradient(135deg, #6200ea 0%, #00bcd4 100%);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      padding-top: 70px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(98, 0, 234, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 188, 212, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Navigation Bar */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 14, 39, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--dark-border);
      z-index: 100;
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient-3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      padding: 10px 20px;
      text-decoration: none;
      color: var(--text-secondary);
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(98, 0, 234, 0.2);
      color: var(--accent);
    }

    /* Header */
    header {
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--gradient-3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Wallet Section */
    .wallet-section {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      animation: slideInUp 0.6s ease-out;
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wallet-icon {
      width: 40px;
      height: 40px;
      background: var(--gradient-1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    #walletAddress {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    #walletAddress.connected {
      color: var(--success);
    }

    #connectWalletBtn {
      padding: 10px 24px;
      border: none;
      background: var(--gradient-1);
      color: white;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #connectWalletBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(98, 0, 234, 0.3);
    }

    /* Card */
    .card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.8s ease-out;
    }

    .card h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .card-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--dark-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(98, 0, 234, 0.1);
      box-shadow: 0 0 0 3px rgba(98, 0, 234, 0.1);
    }

    input[type="file"]::file-selector-button {
      background: var(--gradient-1);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 12px;
      transition: all 0.3s ease;
    }

    input[type="file"]::file-selector-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(98, 0, 234, 0.2);
    }

    /* Buttons */
    button {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
    }

    .btn-primary {
      background: var(--gradient-1);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(98, 0, 234, 0.3);
    }

    .btn-secondary {
      background: rgba(0, 188, 212, 0.15);
      color: var(--accent);
      border: 1px solid var(--accent);
      margin-top: 20px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(0, 188, 212, 0.25);
      box-shadow: 0 8px 16px rgba(0, 188, 212, 0.2);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status Messages */
    #uploadStatus {
      padding: 14px 16px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 0.95rem;
      animation: slideInUp 0.4s ease-out;
      display: none;
    }

    #uploadStatus.show {
      display: block;
    }

    .status-success {
      background: rgba(0, 230, 118, 0.15);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-error {
      background: rgba(255, 61, 0, 0.15);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .status-loading {
      background: rgba(98, 0, 234, 0.15);
      color: var(--primary-light);
      border: 1px solid var(--primary-light);
    }

    /* Step Indicator */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 14px 16px;
      background: rgba(98, 0, 234, 0.1);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .step-number {
      width: 32px;
      height: 32px;
      background: var(--gradient-1);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .divider {
      margin: 40px 0;
      border-top: 1px solid var(--dark-border);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      .card {
        padding: 24px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .wallet-section {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .wallet-info {
        flex-direction: column;
      }

      .nav-links {
        gap: 4px;
      }

      .nav-link {
        padding: 8px 12px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-content">
      <a href="index.html" class="nav-brand">🔐 Edu3ID</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="admin.html" class="nav-link active">Admin Portal</a>
        <a href="student.html" class="nav-link">Student Portal</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Header -->
    <header>
      <h1>📜 Admin Portal</h1>
      <p class="subtitle">Issue and manage student certificates</p>
    </header>

    <!-- Wallet Connection -->
    <div class="wallet-section">
      <div class="wallet-info">
        <div class="wallet-icon">👛</div>
        <div>
          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px;">Wallet Status</div>
          <p id="walletAddress">Not Connected</p>
        </div>
      </div>
      <button id="connectWalletBtn">Connect Wallet</button>
    </div>

    <!-- Main Card -->
    <div class="card">
      <!-- Step 1: Encrypt & Upload -->
      <div class="step-indicator">
        <div class="step-number">1</div>
        <span>Encrypt & Upload to IPFS</span>
      </div>

      <form id="certificateForm">
        <div class="form-group">
          <label for="studentName">Student Name</label>
          <input type="text" id="studentName" placeholder="e.g., John Doe" required />
        </div>

        <div class="form-group">
          <label for="studentGR">Student GR (Roll Number)</label>
          <input type="text" id="studentGR" placeholder="e.g., 21B0012" required />
        </div>

        <div class="form-group">
          <label for="branch">Branch</label>
          <input type="text" id="branch" placeholder="e.g., Computer Science" required />
        </div>

        <div class="form-group">
          <label for="courseName">Course Name</label>
          <input type="text" id="courseName" placeholder="e.g., B.Tech Computer Science" required />
        </div>

        <div class="form-group">
          <label for="certificateImage">Certificate Image</label>
          <input type="file" id="certificateImage" accept="image/*" required />
        </div>

        <button type="submit" class="btn btn-primary">🚀 Encrypt & Upload to IPFS</button>
      </form>

      <div id="uploadStatus"></div>

      <!-- Step 2: Mint NFT -->
      <div class="divider"></div>

      <div class="step-indicator">
        <div class="step-number">2</div>
        <span>Mint As NFT on Blockchain</span>
      </div>

      <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem;">
        Upload and encrypt your certificate first, then mint it as an NFT to register it permanently on the blockchain.
      </p>

      <button type="button" id="mintNFTBtn" class="btn btn-secondary" disabled>
        ⛓️ Mint As NFT (College Registry)
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <script type="module">
    import {Web3Storage} from 'https://unpkg.com/web3.storage/dist/bundle.esm.min.js';
    window.Web3Storage = Web3Storage;
  </script>
  
  <script>
    // Admin portal functionality
    const ethers = window.ethers;
    const connectWalletBtn = document.getElementById('connectWalletBtn');
    const walletAddress = document.getElementById('walletAddress');
    const certificateForm = document.getElementById('certificateForm');
    const uploadStatus = document.getElementById('uploadStatus');
    const mintNFTBtn = document.getElementById('mintNFTBtn');

    let userAddress = null;
    let provider = null;
    let signer = null;
    let contract = null;

    // Contract details
    const CONTRACT_ADDRESS = '0xede54d81fbe4d4ed42fe45a1c89f1356f42a7821';
    let contractABI = [];

    // Load contract ABI
    async function loadABI() {
      try {
        const response = await fetch('./contractABI.json');
        if (!response.ok) throw new Error('contractABI.json not found');
        contractABI = await response.json();
        console.log('✅ ABI loaded');
      } catch (error) {
        console.error('⚠️ ABI load error (optional):', error.message);
      }
    }

    // Connect wallet
    connectWalletBtn.addEventListener('click', async () => {
      try {
        if (!window.ethereum) {
          alert('❌ MetaMask not installed!');
          return;
        }

        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        });

        userAddress = accounts[0];
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();

        walletAddress.textContent = userAddress.substring(0, 6) + '...' + userAddress.substring(38);
        walletAddress.classList.add('connected');
        connectWalletBtn.textContent = 'Connected ✅';
        connectWalletBtn.disabled = true;

        console.log('✅ Wallet connected:', userAddress);
        showStatus('✅ Wallet connected!', 'success');
      } catch (error) {
        console.error('❌ Error:', error);
        showStatus('❌ Connection failed: ' + error.message, 'error');
      }
    });

    // Upload certificate to IPFS
    certificateForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!userAddress) {
        showStatus('❌ Please connect wallet first', 'error');
        return;
      }

      try {
        showStatus('⏳ Encrypting and uploading...', 'loading');

        const studentName = document.getElementById('studentName').value;
        const studentGR = document.getElementById('studentGR').value;
        const branch = document.getElementById('branch').value;
        const courseName = document.getElementById('courseName').value;
        const imageFile = document.getElementById('certificateImage').files[0];

        if (!imageFile) {
          showStatus('❌ Please select an image', 'error');
          return;
        }

        // Read image file
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const imageData = event.target.result;

            // Create metadata
            const metadata = {
              studentName,
              studentGR,
              branch,
              courseName,
              timestamp: new Date().toISOString(),
              image: imageData
            };

            // Encrypt metadata with CryptoJS
            const secretKey = userAddress;
            const encrypted = CryptoJS.AES.encrypt(
              JSON.stringify(metadata),
              secretKey
            ).toString();

            // Save to localStorage as mock IPFS
            const cid = 'ipfs_' + Date.now() + '_' + Math.random().toString(36).substring(7);
            localStorage.setItem(cid, encrypted);
            window.currentCID = cid;
            window.currentEncryptionKey = secretKey;

            // Display CID and encryption key to admin
            const keyDisplay = `
              <div style="margin-top: 16px; padding: 16px; background: rgba(0, 230, 118, 0.1); border: 2px solid var(--success); border-radius: 10px;">
                <div style="font-size: 0.9rem; color: var(--success); margin-bottom: 16px; font-weight: 700;">✅ Certificate encrypted & saved!</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600;">📋 Share these credentials with the student:</div>
                
                <div style="margin-bottom: 14px;">
                  <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px;">Token ID (CID):</div>
                  <div style="background: rgba(98, 0, 234, 0.15); padding: 10px; border-radius: 6px; font-family: 'Space Mono', monospace; color: var(--accent); font-weight: 600; word-break: break-all; font-size: 0.8rem;">${cid}</div>
                  <button type="button" onclick="navigator.clipboard.writeText('${cid}'); alert('✅ CID copied to clipboard!')" style="margin-top: 6px; padding: 6px 12px; background: var(--accent); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.75rem; font-family: 'Plus Jakarta Sans', sans-serif;">📋 Copy CID</button>
                </div>
                
                <div>
                  <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px;">Encryption Key:</div>
                  <div style="background: rgba(98, 0, 234, 0.15); padding: 10px; border-radius: 6px; font-family: 'Space Mono', monospace; color: var(--success); font-weight: 600; word-break: break-all; font-size: 0.8rem;">${secretKey}</div>
                  <button type="button" onclick="navigator.clipboard.writeText('${secretKey}'); alert('✅ Key copied to clipboard!')" style="margin-top: 6px; padding: 6px 12px; background: var(--success); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.75rem; font-family: 'Plus Jakarta Sans', sans-serif;">📋 Copy Key</button>
                </div>
              </div>
            `;
            
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = keyDisplay;
            statusDiv.className = 'show status-success';
            mintNFTBtn.disabled = false;

            console.log('✅ Uploaded:', { studentName, studentGR, branch, courseName, cid, encryptionKey: secretKey });
          } catch (error) {
            console.error('❌ Error:', error);
            showStatus('❌ Upload failed: ' + error.message, 'error');
          }
        };
        reader.readAsDataURL(imageFile);
      } catch (error) {
        console.error('❌ Error:', error);
        showStatus('❌ Error: ' + error.message, 'error');
      }
    });

    // Mint NFT
    mintNFTBtn.addEventListener('click', async () => {
      if (!userAddress) {
        showStatus('❌ Please connect wallet first', 'error');
        return;
      }

      if (!window.currentCID) {
        showStatus('❌ No certificate uploaded yet', 'error');
        return;
      }

      try {
        showStatus('⏳ Minting NFT...', 'loading');

        const tokenURI = `ipfs://${window.currentCID}`;
        const txHash = '0x' + Math.random().toString(16).substring(2, 66);

        showStatus(
          `✅ NFT minted! Tx: ${txHash.substring(0, 10)}...\n\nNote: Using mock transaction for testing.`,
          'success'
        );
        mintNFTBtn.disabled = true;

        console.log('✅ Minted:', { userAddress, tokenURI, txHash });
      } catch (error) {
        console.error('❌ Mint error:', error);
        showStatus('❌ Mint failed: ' + error.message, 'error');
      }
    });

    // Helper function to show status
    function showStatus(message, type) {
      uploadStatus.textContent = message;
      uploadStatus.className = `show status-${type}`;
      console.log(message);
    }

    // Load ABI on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadABI();
    });
  </script>
</body>
</html>
